<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioVision</title>
</head>
<body>

    <div class="logo-container">
        <!-- A -->
        <div class="letter-slot" style="--rotation: -2deg;" data-letter="A">
            <div class="layer active" data-base-color="#e0e0e0">A</div>
            <div class="layer" data-base-color="#c0c0c0">A</div>
        </div>
        <!-- U -->
        <div class="letter-slot" style="--rotation: 1deg;" data-letter="U">
            <div class="layer active" data-base-color="#e0e0e0">U</div>
            <div class="layer" data-base-color="#c0c0c0">U</div>
        </div>
        <!-- D -->
        <div class="letter-slot" style="--rotation: -1deg;" data-letter="D">
            <div class="layer active" data-base-color="#e0e0e0">D</div>
            <div class="layer" data-base-color="#c0c0c0">D</div>
        </div>
        <!-- I -->
        <div class="letter-slot" style="--rotation: 2deg;" data-letter="I">
            <div class="layer active" data-base-color="#e0e0e0">I</div>
            <div class="layer" data-base-color="#c0c0c0">I</div>
        </div>
        <!-- O -->
        <div class="letter-slot" style="--rotation: -2deg;" data-letter="O">
            <div class="layer active" data-base-color="#e0e0e0">O</div>
            <div class="layer" data-base-color="#c0c0c0">O</div>
        </div>
        
        <div class="spacer"></div>

        <!-- V -->
        <div class="letter-slot" style="--rotation: 1deg;" data-letter="V">
            <div class="layer active" data-base-color="#e0e0e0">V</div>
            <div class="layer" data-base-color="#c0c0c0">V</div>
        </div>
        <!-- I -->
        <div class="letter-slot" style="--rotation: -1.5deg;" data-letter="I">
            <div class="layer active" data-base-color="#e0e0e0">I</div>
            <div class="layer" data-base-color="#c0c0c0">I</div>
        </div>
        <!-- S -->
        <div class="letter-slot" style="--rotation: 2.5deg;" data-letter="S">
            <div class="layer active" data-base-color="#e0e0e0">S</div>
            <div class="layer" data-base-color="#c0c0c0">S</div>
        </div>
        <!-- I -->
        <div class="letter-slot" style="--rotation: -2deg;" data-letter="I">
            <div class="layer active" data-base-color="#e0e0e0">I</div>
            <div class="layer" data-base-color="#c0c0c0">I</div>
        </div>
        <!-- O -->
        <div class="letter-slot" style="--rotation: 1.5deg;" data-letter="O">
            <div class="layer active" data-base-color="#e0e0e0">O</div>
            <div class="layer" data-base-color="#c0c0c0">O</div>
        </div>
        <!-- N -->
        <div class="letter-slot" style="--rotation: -1deg;" data-letter="N">
            <div class="layer active" data-base-color="#e0e0e0">N</div>
            <div class="layer" data-base-color="#c0c0c0">N</div>
        </div>
    </div>

    <script>
        // --- THE RANDOMIZER BRAIN ---
        const letterSlots = document.querySelectorAll('.letter-slot');

        function randomizeLetter() {
            const randomSlot = letterSlots[Math.floor(Math.random() * letterSlots.length)];
            const activeLayer = randomSlot.querySelector('.layer.active');
            const hiddenLayer = randomSlot.querySelector('.layer:not(.active)');
            
            // Modify CSS color locally instead of swapping image URLs
            const currentColor = hiddenLayer.style.color;
            if (!currentColor || currentColor === "") {
                hiddenLayer.style.color = "#ff4444"; // Flash red
            } else {
                hiddenLayer.style.color = ""; // Reset to CSS default
            }

            activeLayer.classList.remove('active');
            hiddenLayer.classList.add('active');
        }

        setInterval(randomizeLetter, 1500);
    </script>
</body>
</html>
